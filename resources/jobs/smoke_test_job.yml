# Smoke test job — permanent infrastructure health check.
# Runs after every dev deploy via cd-dev.yml.
# Per D-04: this job is NEVER removed after Phase 1.
# Per D-05: cd-dev.yml triggers this after databricks bundle deploy --target dev.
# Per D-06: validates secrets, UC access, and bronze table roundtrip.

resources:
  jobs:
    smoke_test_job:
      name: dbx-mls-smoke-test
      timeout_seconds: 14400
      git_source:
        git_url: https://github.com/gustavofs-git/dbx-mls
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: smoke_test
          notebook_task:
            notebook_path: notebooks/smoke_test
            source: GIT
          job_cluster_key: job_cluster_shared
          libraries:
            - pypi:
                package: requests>=2.32.0
            - pypi:
                package: tenacity>=9.0.0
      job_clusters:
        - job_cluster_key: job_cluster_shared
          new_cluster:
            spark_version: 16.4.x-scala2.12
            node_type_id: Standard_F2s_v2
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            autotermination_minutes: 0
            custom_tags:
              project: dbx-mls
              job: smoke-test
              ResourceClass: SingleNode
